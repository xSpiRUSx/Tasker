orchestrator:
  task_id_prefix: "ENG"
  timezone: "Europe/Moscow"

storage:
  sqlite_path: "./data/orchestrator.sqlite3"

artifacts:
  root_path: "D:/Obsidian/TaskStore"
  task_folder_template: "{task_id} - {project_id} - {slug_short}"
  write_frontmatter: true
  keep_versions: true
  use_relative_paths_in_db: true

router:
  provider: "codex-cli"
  projects_path: "./config/projects.yml"
  workflows_path: "./config/workflows.yml"

planning:
  provider: "codex-cli"
  model: null
  timeout_seconds: 900

execution:
  default_executor: "codex"
  codex_bin: "codex"
  codex_model: null
  codex_timeout_seconds: 1800
  worktrees_root: "./data/worktrees"
  branch_template: "ai/{task_id}-{slug}"

validation:
  run_tests_after_execution: true
  command_timeout_seconds: 600
  fail_on_missing_commands: false

loop:
  default_max_iterations: 2
  default_max_runtime_seconds: 1800
  default_max_changed_files: 12
  default_max_diff_lines: 1200
  repair_on_validation_failure: true
  require_human_on_blocked_path: true
  require_human_on_config_change: true

  workflows:
    simple_dev_no_config:
      max_iterations: 2
      max_changed_files: 8
      max_diff_lines: 800

    simple_dev_with_config:
      max_iterations: 2
      max_changed_files: 12
      max_diff_lines: 1200

    complex_change:
      max_iterations: 1
      require_human_on_each_phase: true

approvals:
  require_plan_approval: true
  require_diff_approval: true
  require_commit_approval: true

corrections:
  default_action_for_diff_comments: "request_changes_and_run"
  comment_is_execution_approval: true
  skip_full_replanning_when:
    - source_gate == "diff"
    - task_has_approved_plan == true
    - correction_within_existing_scope == true
    - no_blocked_paths_touched == true
    - no_config_change == true
    - no_security_or_role_change == true
  require_spec_addendum_when:
    - changes_business_rule == true
    - touches_config == true
    - touches_security_or_roles == true
    - touches_deploy_or_migrations == true
    - changes_public_contract == true

web:
  cors_origins:
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
