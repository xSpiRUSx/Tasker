tools:
  - id: codex
    name: Codex
    type: coding_agent
    description: Uses Codex for implementation, investigation, and code review tasks.
  - id: 1c-graph-metadata-mcp
    name: 1C Graph Metadata MCP
    type: mcp
    description: Analyzes 1C metadata and BSL code through a graph index.

projects:
  - id: billing-api
    name: Billing API
    path: ./examples/billing-api
    aliases:
      - billing
      - billing-api
      - auth
      - login
    description: FastAPI billing backend sample project.
    tools:
      - codex
    default_model_profile: balanced
    model_overrides:
      planning: gpt55_medium
      execution: codex_gpt55_medium
      correction_micro: codex_spark
      correction_minor: codex_gpt55_medium
      review: gpt55_medium
    token_policy:
      max_executor_prompt_chars: 300000
      max_correction_prompt_chars: 120000
      max_diff_chars_for_llm_review: 60000
    test_commands:
      - pytest
    blocked_paths:
      - .env
      - .env.*
      - secrets/**
    allowed_paths:
      - src/**
      - tests/**
      - docs/**
      - README.md
    max_changed_files: 50
    max_diff_bytes: 250000

  - id: generic
    name: Generic Project
    path: .
    aliases:
      - generic
      - default
    description: Default local project used when the request does not mention a configured project.
    tools:
      - codex
    default_model_profile: balanced
    model_overrides:
      planning: gpt55_medium
      execution: codex_gpt55_medium
      correction_micro: codex_spark
      correction_minor: codex_gpt55_medium
      review: gpt55_medium
    token_policy:
      max_executor_prompt_chars: 300000
      max_correction_prompt_chars: 120000
      max_diff_chars_for_llm_review: 60000
    test_commands:
      - python -m pytest
    blocked_paths:
      - .env
      - .env.*
      - secrets/**
      - data/**
    max_changed_files: 100
    max_diff_bytes: 500000

  - id: solvix_zn
    name: Solvix_ZN
    path: C:\Configuration\Solvix_ZN
    aliases: ["solvix", "solvix_zn", "zn", "зн", "сольвикс"]
    description: Рабочий проект в каталоге C:\Configuration\Solvix_ZN.
    tools: ["codex"]
    default_model_profile: balanced
    model_overrides:
      planning: gpt55_high
      execution: codex_gpt55_high
      correction_micro: codex_spark
      correction_minor: codex_gpt55_medium
      review: gpt55_high
    token_policy:
      max_executor_prompt_chars: 300000
      max_correction_prompt_chars: 120000
      max_diff_chars_for_llm_review: 60000
    project_type: 1c
    metadata_root: src/cfe
    external_artifacts_root: external
    validation_profile: 1c
    test_commands: []
    blocked_paths:
      - .env
      - .env.*
      - secrets/**
      - data/**
    allowed_external_artifact_paths:
      - artifacts/**
      - external/**
    risky_areas:
      - roles
      - permissions
      - exchanges
      - регистры
      - справочники
    max_changed_files: 100
    max_diff_bytes: 500000

  - id: sq_erp_ext
    name: Снежная королева ЕРП
    path: C:\Configuration\SQ_ERP\ERP_Ext
    aliases: ["sq_erp_ext", "sq erp", "erp_ext", "снежная королева", "снежная королева ерп", "ск ерп"]
    description: Проект Снежная королева ЕРП в каталоге C:\Configuration\SQ_ERP\ERP_Ext.
    tools: ["codex", "1c-graph-metadata-mcp"]
    default_model_profile: balanced
    model_overrides:
      planning: gpt55_high
      execution: codex_gpt55_high
      correction_micro: codex_spark
      correction_minor: codex_gpt55_medium
      review: gpt55_high
    token_policy:
      max_executor_prompt_chars: 300000
      max_correction_prompt_chars: 120000
      max_diff_chars_for_llm_review: 60000
    project_type: 1c
    metadata_root: src/cfe
    external_artifacts_root: external
    validation_profile: 1c
    test_commands: []
    blocked_paths:
      - .env
      - .env.*
      - secrets/**
      - data/**
    allowed_external_artifact_paths:
      - artifacts/**
      - external/**
    risky_areas:
      - roles
      - permissions
      - exchanges
      - регистры
      - справочники
    max_changed_files: 100
    max_diff_bytes: 500000
