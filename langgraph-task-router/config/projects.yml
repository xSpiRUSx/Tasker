    name: Codex LLM
    type: llm
    description: Understands tasks, answers questions, and can inspect project context.
  - id: 1c-graph-metadata-mcp
    name: 1C Graph Metadata MCP
    type: mcp
    description: Analyzes 1C metadata and BSL code through a graph index; searches objects, code, dependencies, register movements, and business descriptions.

